    <link rel="stylesheet" href="./css/styles.css"/>

    <!-- Google Fonts (loaded async so they don't block first render; preconnect is up top) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap"/>
